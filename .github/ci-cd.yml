name: Integración Continua (CI)

# El flujo se activa al hacer push o PR a la rama principal
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. TRABAJO PARA EL FRONTEND (Node.js + Vite)
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Ajusta a tu versión de Node
          cache: 'npm'       # Cachea node_modules automáticamente

      - name: Instalar dependencias
        run: npm ci # Usa 'ci' en lugar de 'install' para entornos de CI

      - name: Validar formateo y linter (Opcional)
        run: npm run lint --if-present

      - name: Compilar Frontend con Vite
        run: npm run build

  # 2. TRABAJO PARA EL BACKEND (PHP)
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar PHP y extensiones
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' # Ajusta a tu versión de PHP
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql
          coverage: none

      - name: Validar sintaxis de PHP (Lint)
        run: find . -name "*.php" ! -path "./vendor/*" -exec php -l {} \;

      - name: Obtener directorio de caché de Composer
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cachear dependencias de Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps:composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Instalar dependencias de Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Ejecutar Tests (PHPUnit / Pest)
        run: vendor/bin/phpunit --if-present